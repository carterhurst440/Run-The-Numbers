<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#neon)">
    <!-- coconut (green) -->
    <g stroke="#7ff03a">
      <path d="M26 44 A28 28 0 1 0 74 44"/>
      <path d="M26 44 Q50 33 74 44"/>
      <path d="M31 47 Q50 55 69 47"/>
      <path d="M41 49 l-1.4 4.6 l-1.5 -3"/>
      <path d="M50 50 l-1.4 4.6 l-1.5 -3"/>
      <path d="M59 49 l-1.4 4.6 l-1.5 -3"/>
    </g>
    <!-- paper umbrella (cyan) -->
    <g stroke="#35e0e0">
      <circle cx="31" cy="23" r="2.3" fill="#35e0e0" stroke="none"/>
      <path d="M31 25.3 L18 41 L50 32 Z"/>
      <path d="M31 25.3 L25 40 M31 25.3 L37.5 36.5 M31 25.3 L44 33.5"/>
    </g>
    <!-- umbrella pole (pink) -->
    <path stroke="#ff44cc" d="M34.5 39 L43 51"/>
    <!-- bent straw with corrugated elbow (orange) -->
    <g stroke="#ffa81f">
      <path d="M56 49 L63 26"/>
      <path d="M63 26 Q65 19 73 18 L82 16"/>
      <path d="M60.3 31 l4.7 -1.3 M61.5 27.3 l4.7 -1.3 M62.7 23.6 l4.7 -1.3"/>
